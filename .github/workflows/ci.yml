name: Production CI
on:
  pull_request:
  push:
    branches: [main, production, "release/**"]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/materialize-source.cjs
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: command-ai-os:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
