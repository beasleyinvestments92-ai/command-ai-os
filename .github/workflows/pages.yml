name: Deploy COMMAND AI OS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Reconstruct static application
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public
          cat .site-parts/part-*.b64 | base64 --decode | gunzip > public/index.html
          touch public/.nojekyll
          echo "158bbebc985b5d180a4febeaa9970a229399fabe89312c56774b3d2392a29dfa  public/index.html" | sha256sum --check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
