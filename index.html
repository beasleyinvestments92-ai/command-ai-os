<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07111f">
  <title>Launching COMMAND AI OS</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07111f;color:#e9f2ff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(560px,calc(100% - 32px));padding:32px;border:1px solid rgba(142,180,255,.22);border-radius:22px;background:rgba(14,29,50,.9);box-shadow:0 28px 80px rgba(0,0,0,.35)}h1{margin:0 0 10px;font-size:clamp(24px,5vw,38px)}p{margin:0;color:#a8b8cf;line-height:1.6}.bar{height:8px;margin-top:24px;overflow:hidden;border-radius:999px;background:#152942}.bar:after{content:"";display:block;width:45%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#4e8cff,#64e8cf);animation:load 1.15s ease-in-out infinite alternate}@keyframes load{from{transform:translateX(-90%)}to{transform:translateX(210%)}}#error{display:none;margin-top:18px;padding:14px;border-radius:12px;background:#351923;color:#ffbec8;white-space:pre-wrap}
  </style>
</head>
<body>
  <main class="card">
    <h1>COMMAND AI OS</h1>
    <p>Loading the white-label AI business operating system.</p>
    <div class="bar" aria-label="Loading"></div>
    <div id="error" role="alert"></div>
  </main>
  <script>
    (async function launch(){
      const parts=[0,1,2,3,4].map(n=>`.site-parts/part-${String(n).padStart(2,'0')}.b64`);
      const responses=await Promise.all(parts.map(async path=>{
        const response=await fetch(path,{cache:'no-store'});
        if(!response.ok) throw new Error(`Could not load ${path} (${response.status})`);
        return response.text();
      }));
      if(!('DecompressionStream' in window)) throw new Error('This browser does not support the required decompression feature. Open the site in a current version of Chrome, Edge, Firefox, or Safari.');
      const encoded=responses.join('').replace(/\s+/g,'');
      const binary=atob(encoded);
      const bytes=Uint8Array.from(binary,char=>char.charCodeAt(0));
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html=await new Response(stream).text();
      document.open();
      document.write(html);
      document.close();
    })().catch(error=>{
      const node=document.getElementById('error');
      node.style.display='block';
      node.textContent=`Launch failed: ${error.message}`;
    });
  </script>
</body>
</html>
