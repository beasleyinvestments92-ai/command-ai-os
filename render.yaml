databases:
  - name: command-ai-postgres
    databaseName: command_ai
    user: command_ai
    plan: basic-256mb
    ipAllowList: []

services:
  - type: web
    name: command-ai-os
    runtime: node
    plan: starter
    buildCommand: node scripts/materialize-source.cjs && npm install --no-audit --no-fund
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /readyz
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: command-ai-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: AUTO_MIGRATE
        value: "false"
      - key: AUTO_SEED
        value: "true"
      - key: SESSION_PEPPER
        generateValue: true
      - key: INTEGRATION_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
